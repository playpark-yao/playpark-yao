name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 0 * * 1,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Supabaseに自動アクセス
        run: |
          curl -f -s \
            "${{ secrets.SUPABASE_URL }}/rest/v1/site_settings?limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            && echo "✅ 成功" || echo "⚠️ レスポンスあり（継続）"

      - name: 完了
        run: echo "✅ Keep Alive 完了 $(date '+%Y-%m-%d %H:%M:%S')"
