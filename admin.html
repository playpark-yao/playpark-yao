<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理パネル | プレーパーク八尾</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root{--green:#3a7d44;--green-pale:#e8f5e9;--earth:#8d6e47;--sun:#f5c842;--red:#e05a44;--bg:#f4f7f4;--text:#2c2c2c;--text-light:#777;--border:#ddeedd;--shadow:0 2px 16px rgba(0,0,0,.07);--radius:16px;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Zen Maru Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    #loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#c8f0a0,#87d4a8 50%,#87ceeb);padding:20px;}
    .login-card{background:white;border-radius:24px;padding:40px 28px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,.12);text-align:center;}
    .login-icon{font-size:52px;margin-bottom:12px;}
    .login-card h1{font-size:20px;font-weight:900;color:var(--green);margin-bottom:4px;}
    .login-card p{font-size:12px;color:var(--text-light);margin-bottom:28px;}
    .login-input{width:100%;border:2px solid var(--border);border-radius:12px;padding:13px 16px;font-size:15px;font-family:'Zen Maru Gothic',sans-serif;margin-bottom:12px;outline:none;}
    .login-input:focus{border-color:var(--green);}
    .login-btn{width:100%;background:var(--green);color:white;border:none;border-radius:50px;padding:14px;font-size:15px;font-family:'Zen Maru Gothic',sans-serif;font-weight:900;cursor:pointer;}
    .login-error{color:var(--red);font-size:12px;margin-top:8px;display:none;}
    #app{display:none;}
    .top-bar{background:white;border-bottom:2px solid var(--green-pale);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
    .top-bar h1{font-size:15px;font-weight:900;color:var(--green);}
    .logout-btn{background:none;border:1.5px solid #ccc;border-radius:50px;padding:6px 14px;font-size:12px;font-family:'Zen Maru Gothic',sans-serif;cursor:pointer;color:var(--text-light);}
    .layout{display:flex;min-height:calc(100vh - 56px);}
    .sidebar{width:220px;background:white;border-right:2px solid var(--green-pale);padding:20px 12px;display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
    .sidebar-label{font-size:10px;font-weight:700;color:var(--text-light);letter-spacing:.15em;padding:8px 8px 4px;text-transform:uppercase;}
    .nav-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;color:var(--text-light);border:none;background:none;width:100%;text-align:left;transition:all .15s;}
    .nav-item:hover{background:var(--green-pale);color:var(--green);}
    .nav-item.active{background:var(--green);color:white;}
    .main-content{flex:1;padding:24px;overflow-y:auto;}
    .page{display:none;}.page.active{display:block;}
    .page-title{font-size:20px;font-weight:900;color:var(--green);margin-bottom:20px;}
    .card{background:white;border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);margin-bottom:16px;}
    .card h3{font-size:15px;font-weight:900;color:var(--green);margin-bottom:14px;border-bottom:1.5px solid var(--border);padding-bottom:10px;}
    .form-row{margin-bottom:14px;}
    .form-row label{display:block;font-size:12px;font-weight:700;color:var(--green);margin-bottom:5px;}
    .form-input{width:100%;border:2px solid var(--border);border-radius:10px;padding:10px 12px;font-size:13px;font-family:'Zen Maru Gothic',sans-serif;outline:none;}
    .form-input:focus{border-color:var(--green);}
    textarea.form-input{resize:vertical;min-height:80px;}
    .save-btn{background:var(--green);color:white;border:none;border-radius:50px;padding:10px 24px;font-size:13px;font-family:'Zen Maru Gothic',sans-serif;font-weight:700;cursor:pointer;}
    .upload-area{border:2px dashed #6abf69;border-radius:12px;padding:20px;text-align:center;cursor:pointer;color:var(--green);font-weight:700;font-size:13px;}
    .upload-area:hover{background:var(--green-pale);}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:white;padding:12px 24px;border-radius:50px;font-size:13px;font-weight:700;z-index:999;transition:transform .3s;white-space:nowrap;}
    .toast.show{transform:translateX(-50%) translateY(0);}
    @media(max-width:700px){.sidebar{display:none;}.main-content{padding:14px;}}
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-icon">🔐</div>
    <h1>管理者ログイン</h1>
    <p>プレーパーク八尾 管理パネル</p>
    <input class="login-input" type="text" id="loginUser" placeholder="ユーザー名">
    <input class="login-input" type="password" id="loginPass" placeholder="パスワード">
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div class="login-error" id="loginError">ユーザー名またはパスワードが違います</div>
  </div>
</div>

<div id="app">
  <div class="top-bar">
    <h1>🌳 プレーパーク八尾 管理パネル</h1>
    <button class="logout-btn" onclick="doLogout()">ログアウト</button>
  </div>
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-label">メイン</div>
      <button class="nav-item active" onclick="showPage('slides',this)"><span>🖼️</span> スライドショー</button>
      <button class="nav-item" onclick="showPage('apply',this)"><span>✏️</span> 申込管理</button>
      <button class="nav-item" onclick="showPage('ai',this)"><span>🤖</span> AIアシスタント</button>
      <div class="sidebar-label" style="margin-top:8px;">記録・設定</div>
      <button class="nav-item" onclick="showPage('settings',this)"><span>⚙️</span> 設定</button>
      <button class="nav-item" onclick="window.open('index.html','_blank')"><span>🌐</span> サイトを見る</button>
    </div>

    <div class="main-content">
      <div class="page active" id="page-slides">
        <div class="page-title">🖼️ スライドショー管理</div>
        <div class="card"><h3>スライド設定などはここに実装</h3></div>
      </div>

      <div class="page" id="page-apply">
        <div class="page-title">✏️ 申込管理</div>
        <div class="card"><h3>申込管理の設定はここに実装</h3></div>
      </div>

      <div class="page" id="page-ai">
        <div class="page-title">🤖 AIアシスタント</div>
        <div class="card"><h3>AIチャットはここに実装</h3></div>
      </div>

      <div class="page" id="page-settings">
        <div class="page-title">⚙️ 設定</div>
        
        <div class="card">
          <h3>🔐 管理者アカウント</h3>
          <div class="form-row"><label>新しいユーザー名</label><input class="form-input" type="text" id="newUser"></div>
          <button class="save-btn">💾 更新</button>
        </div>

        <div class="card">
          <h3>🔗 外部サービス連携</h3>
          <div class="form-row"><label>📸 Instagram ID</label><input class="form-input" type="text" id="instaId"></div>
          <button class="save-btn" onclick="saveServices()">💾 保存して反映</button>
        </div>

        <div class="card">
          <h3>🖼️ サイトロゴ設定</h3>
          <p style="font-size:12px;color:var(--text-light);margin-bottom:14px;">ヘッダーに表示されるメインロゴです。</p>
          <div style="display:flex;align-items:center;gap:16px;margin-bottom:14px;">
            <div id="logoPreview" style="width:120px;height:60px;background:#eee;border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid var(--border);">
              <span style="font-size:10px;color:#aaa;">No Image</span>
            </div>
            <div style="flex:1;">
              <div style="font-size:13px;font-weight:700;margin-bottom:4px;">現在のロゴ</div>
              <div style="font-size:11px;color:var(--text-light);">推奨：横長 / 背景が透明なPNG</div>
            </div>
          </div>
          <div class="upload-area" onclick="document.getElementById('logoFile').click()" style="padding:14px;">
            📁 ロゴ画像を選択
          </div>
          <input type="file" id="logoFile" accept="image/*" style="display:none" onchange="uploadLogo(this.files)">
          <button class="save-btn" style="margin-top:10px;background:#fdecea;color:var(--red);" onclick="clearLogo()">🗑️ ロゴを削除して文字に戻す</button>
        </div>

        <div class="card">
          <h3>📲 PWAアイコン設定</h3>
          <div class="upload-area">📁 アイコンを選ぶ</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast">メッセージ</div>

<script>
  // --- ページ切り替え ---
  function showPage(pageId, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + pageId).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  // --- トースト表示 ---
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // --- ログイン処理 (簡易版) ---
  function doLogin() {
    const user = document.getElementById('loginUser').value;
    const pass = document.getElementById('loginPass').value;
    if(user === "admin" && pass === "admin") { // 実際のパスワードに書き換えてください
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      initApp();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  }

  function doLogout() {
    location.reload();
  }

  // --- アプリ初期化 ---
  function initApp() {
    loadLogoSetting();
    // 他の初期化処理
  }

  // --- サイトロゴ関連の処理 ---

  // 仮の保存・取得関数 (お使いのバックエンド/Storageに合わせて調整してください)
  async function sbSaveSetting(key, value) {
    return new Promise(resolve => {
      localStorage.setItem(key, value); // デモ用にlocalStorageを使用
      resolve();
    });
  }
  async function sbGetSetting(key) {
    return localStorage.getItem(key);
  }

  async function uploadLogo(files) {
    if (!files || !files[0]) return;
    const file = files[0];

    if (file.size > 1024 * 1024) {
      alert("1MB以下の画像にしてください。");
      return;
    }

    const reader = new FileReader();
    reader.onload = async (e) => {
      const base64Data = e.target.result;
      document.getElementById('logoPreview').innerHTML = `<img src="${base64Data}" style="width:100%;height:100%;object-fit:contain;">`;

      try {
        await sbSaveSetting('site_logo', base64Data);
        showToast("ロゴを保存しました！");
      } catch (err) {
        alert("保存に失敗しました。");
      }
    };
    reader.readAsDataURL(file);
  }

  async function clearLogo() {
    if (!confirm("ロゴを削除して文字表示に戻しますか？")) return;
    try {
      await sbSaveSetting('site_logo', '');
      document.getElementById('logoPreview').innerHTML = '<span style="font-size:10px;color:#aaa;">No Image</span>';
      showToast("ロゴを削除しました");
    } catch (err) {
      alert("削除に失敗しました。");
    }
  }

  async function loadLogoSetting() {
    const currentLogo = await sbGetSetting('site_logo');
    if (currentLogo) {
      document.getElementById('logoPreview').innerHTML = `<img src="${currentLogo}" style="width:100%;height:100%;object-fit:contain;">`;
    }
  }

  function saveServices() {
    showToast("設定を保存しました");
  }

</script>
</body>
</html>
