<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プレーパーク八尾 | 子どもの自然遊び・プレーパーク（大阪府八尾市）</title>

  <meta name="description" content="大阪府八尾市で開催する子どもの自然遊び・プレーパーク。どろんこ・焚き火・木登りなど、自由な遊びを通じて子どもたちの育ちを支える地域の居場所です。月2回開催・参加無料。">
  <meta name="keywords" content="プレーパーク,八尾,八尾市,子ども,自然遊び,焚き火,木登り,どろんこ,子育て,遊び場,大阪,居場所">
  <meta name="author" content="プレーパーク八尾">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://playpark-yao.github.io/playpark-yao/">
  <meta name="google-site-verification" content="7I2E9uEtJataH92MsaybuZXDl-FtQo-0jNE9qTtdki0" />

  <meta property="og:type" content="website">
  <meta property="og:title" content="プレーパーク八尾 | 子どもの自然遊び（大阪府八尾市）">
  <meta property="og:description" content="大阪府八尾市で開催する子どもの自然遊び・プレーパーク。どろんこ・焚き火・木登りなど、自由な遊びを通じて子どもたちの育ちを支える地域の居場所です。">
  <meta property="og:url" content="https://playpark-yao.github.io/playpark-yao/">
  <meta property="og:site_name" content="プレーパーク八尾">
  <meta property="og:locale" content="ja_JP">

  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="プレーパーク八尾">
  <link rel="apple-touch-icon" href="icon-192.png" id="appleIcon">
  <meta name="theme-color" content="#3a7d44">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    /* --- ライトボックス基本設定 --- */
    .lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:9999;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(5px);}
    .lightbox.open{display:flex;}
    .lightbox img{max-width:100%;max-height:90vh;object-fit:contain;border-radius:8px;box-shadow:0 0 30px rgba(0,0,0,0.5);}
    .lightbox-close{position:absolute;top:20px;right:20px;width:44px;height:44px;background:rgba(255,255,255,0.2);border:none;border-radius:50%;color:white;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

    :root{--green:#3a7d44;--green-light:#6abf69;--green-pale:#e8f5e9;--earth:#8d6e47;--sky:#87ceeb;--sky-dark:#4a9ebe;--sun:#f5c842;--red:#e05a44;--bg:#fffef7;--text:#2c2c2c;--text-light:#666;--shadow:0 4px 20px rgba(0,0,0,0.08);--radius:20px;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Zen Maru Gothic',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}
    header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,247,0.93);backdrop-filter:blur(12px);border-bottom:2px solid var(--green-pale);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .logo-icon{width:44px;height:44px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;}
    .logo-text .main{font-size:15px;font-weight:900;color:var(--green);}
    .logo-text .sub{font-size:10px;color:var(--earth);letter-spacing:.1em;}
    .header-actions{display:flex;gap:8px;align-items:center;}
    .btn-line{background:#06C755;color:white;border:none;border-radius:50px;padding:8px 14px;font-size:12px;font-family:'Zen Maru Gothic',sans-serif;font-weight:700;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:5px;}
    .hamburger{background:none;border:none;cursor:pointer;padding:4px;display:flex;flex-direction:column;gap:5px;}
    .hamburger span{display:block;width:24px;height:2.5px;background:var(--green);border-radius:2px;}
    .nav-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;}
    .nav-overlay.open{opacity:1;pointer-events:all;}
    .nav-drawer{position:fixed;top:0;right:-280px;width:280px;height:100%;background:var(--bg);z-index:201;padding:80px 30px 40px;transition:right .35s cubic-bezier(.25,.46,.45,.94);overflow-y:auto;}
    .nav-drawer.open{right:0;}
    .nav-drawer nav a{display:flex;padding:14px 0;border-bottom:1px solid var(--green-pale);text-decoration:none;color:var(--text);font-size:16px;font-weight:700;align-items:center;gap:10px;}
    .slideshow{margin-top:70px;position:relative;width:100%;height:min(65vw,400px);overflow:hidden;background:linear-gradient(160deg,#c8f0a0,#87d4a8 40%,#87ceeb);}
    .slide{position:absolute;inset:0;opacity:0;transition:opacity .8s ease;cursor:pointer;}
    .slide.active{opacity:1;}
    .slide img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
    .slide-caption{position:absolute;bottom:0;left:0;right:0;z-index:2;padding:12px 20px 16px;background:linear-gradient(transparent,rgba(0,0,0,0.5));color:white;font-size:15px;font-weight:900;text-shadow:0 1px 6px rgba(0,0,0,.4);}
    .slide-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:3;background:rgba(255,255,255,0.25);border:none;border-radius:50%;width:36px;height:36px;font-size:20px;cursor:pointer;color:white;display:flex;align-items:center;justify-content:center;}
    .slide-prev{left:10px;}.slide-next{right:10px;}

    /* --- Instagramグリッド --- */
    #instaPostsWrap {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
      padding: 10px;
    }
    .insta-post-item {
      aspect-ratio: 1/1;
      overflow: hidden;
      background: #eee;
      cursor: pointer;
    }
    .insta-post-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    section{padding:40px 20px;}
    .section-header{text-align:center;margin-bottom:28px;}
    .section-label{font-size:11px;letter-spacing:.2em;color:var(--earth);font-weight:700;text-transform:uppercase;margin-bottom:6px;}
    .section-title{font-size:24px;font-weight:900;color:var(--green);line-height:1.3;}
    .section-title span{color:var(--earth);}
    .next-event{background:linear-gradient(135deg,var(--green),var(--sky-dark));border-radius:var(--radius);padding:24px;color:white;margin-bottom:20px;position:relative;overflow:hidden;background-size:cover;background-position:center;}
    .event-label{background:var(--sun);color:var(--earth);font-size:11px;font-weight:900;padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:10px;}
    .next-event h3{font-size:20px;font-weight:900;margin-bottom:8px;}
    .apply-open-btn{display:block;width:100%;background:white;color:var(--green);border:none;border-radius:50px;padding:14px;font-size:15px;font-family:'Zen Maru Gothic',sans-serif;font-weight:900;cursor:pointer;text-align:center;text-decoration:none;box-shadow:0 4px 12px rgba(0,0,0,.15);}
    .posts-section{background:white;border-radius:var(--radius) var(--radius) 0 0;}
    .tab-bar{display:flex;margin-bottom:24px;background:var(--green-pale);border-radius:50px;padding:4px;}
    .tab-btn{flex:1;background:none;border:none;border-radius:50px;padding:10px 6px;font-family:'Zen Maru Gothic',sans-serif;font-size:13px;font-weight:700;color:var(--text-light);cursor:pointer;transition:all .25s;}
    .tab-btn.active{background:white;color:var(--green);box-shadow:0 2px 8px rgba(0,0,0,.1);}
    .post-card{border:1.5px solid var(--green-pale);border-radius:16px;padding:16px;margin-bottom:12px;}
    .post-card h4{font-size:15px;font-weight:700;margin-bottom:6px;}
    .post-card img{width:100%;border-radius:8px;margin-top:10px;cursor:pointer;}
    .about-section{background:var(--green-pale);}
    .features-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .feature-card{background:white;border-radius:16px;padding:18px 14px;text-align:center;}
    .feat-icon{font-size:36px;display:block;margin-bottom:8px;}
    .feature-card h4{font-size:13px;font-weight:900;color:var(--green);margin-bottom:4px;}
    .event-item{background:var(--green-pale);border-radius:14px;padding:16px;margin-bottom:12px;}
    .map-wrap{background:#d4edda;border-radius:14px;height:220px;overflow:hidden;margin-bottom:20px;}
    .map-wrap iframe{width:100%;height:100%;border:none;}
    .line-section{background:linear-gradient(135deg,#00B900,#06C755);padding:30px 20px;text-align:center;color:white;}
    .btn-line-lg{background:white;color:#06C755;border:none;border-radius:50px;padding:14px 32px;font-size:16px;font-family:'Zen Maru Gothic',sans-serif;font-weight:900;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px;}
    footer{background:var(--green);color:white;padding:30px 20px;text-align:center;padding-bottom:100px;}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1.5px solid var(--green-pale);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
    .bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;text-decoration:none;color:var(--text-light);font-size:10px;font-weight:700;}
    .reveal{opacity:0;transform:translateY(20px);transition:opacity .5s,transform .5s;}
    .reveal.visible{opacity:1;transform:translateY(0);}
  </style>
</head>
<body>

<header>
  <a href="#top" class="logo">
    <div class="logo-icon">🌳</div>
    <div class="logo-text"><div class="main">プレーパーク八尾</div><div class="sub">PLAY PARK YAO</div></div>
  </a>
  <div class="header-actions">
    <a href="#line" class="btn-line">💬 LINE</a>
    <button class="hamburger" id="menuBtn"><span></span><span></span><span></span></button>
  </div>
</header>

<div class="nav-overlay" id="navOverlay" onclick="closeMenu()"></div>
<div class="nav-drawer" id="navDrawer">
  <nav>
    <a href="#next-event" onclick="closeMenu()"><span>📅</span>次回イベント</a>
    <a href="#posts" onclick="closeMenu()"><span>📸</span>投稿・インスタ</a>
    <a href="#about" onclick="closeMenu()"><span>🌿</span>プレーパークって？</a>
    <a href="#events" onclick="closeMenu()"><span>🎪</span>イベント一覧</a>
    <a href="#access" onclick="closeMenu()"><span>📍</span>アクセス</a>
  </nav>
</div>

<main id="top">
  <div class="slideshow" id="slideshow">
    <button class="slide-arrow slide-prev" onclick="slidePrev()">‹</button>
    <button class="slide-arrow slide-next" onclick="slideNext()">›</button>
  </div>

  <section id="next-event">
    <div class="next-event reveal" id="nextEventCard">
      <div class="event-label">📣 次回予告</div>
      <div id="nextEventContent"></div>
      <div id="applyStatusWrap"></div>
    </div>
  </section>

  <section class="posts-section" id="posts">
    <div class="section-header">
      <div class="section-label">POSTS & UPDATES</div>
      <div class="section-title">最新<span>投稿</span></div>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('instagram',this)">📸 インスタ</button>
      <button class="tab-btn" onclick="switchTab('news',this)">📢 お知らせ</button>
    </div>
    <div id="tab-instagram"><div id="instaPostsWrap"></div></div>
    <div id="tab-news" style="display:none;"><div id="newsWrap"></div></div>
  </section>

  <section class="about-section" id="about">
    <div class="section-header"><div class="section-title">プレーパークって<span>なに？</span></div></div>
    <div class="features-grid" id="featuresGrid"></div>
  </section>

  <section id="events">
    <div class="section-header"><div class="section-title">イベント<span>スケジュール</span></div></div>
    <div id="eventsList"></div>
  </section>

  <section class="access-section" id="access">
    <div class="section-header"><div class="section-title">アクセス</div></div>
    <div id="accessMapWrap" class="map-wrap"></div>
    <div id="accessInfoWrap"></div>
  </section>

  <section id="pwa-install" style="text-align:center; padding: 20px;">
    <button id="notifyBtn" onclick="requestNotificationPermission()" style="background:#4a9ebe;color:white;border:none;border-radius:50px;padding:14px 20px;font-weight:900;">🔔 通知を受け取る</button>
    <p id="notifyMsg" style="font-size:11px; margin-top:10px;"></p>
  </section>

  <section class="line-section" id="line">
    <h3>公式LINEで最新情報をGET</h3>
    <a href="#" class="btn-line-lg" id="lineMainBtn">💬 友だち追加</a>
  </section>
</main>

<footer>
  <div class="footer-logo">🌳 プレーパーク八尾</div>
  <small>© 2025 プレーパーク八尾</small>
</footer>

<nav class="bottom-nav">
  <a href="#top">🏠<span>ホーム</span></a>
  <a href="#events">📅<span>イベント</span></a>
  <a href="#posts">📸<span>投稿</span></a>
  <a href="#line">💬<span>LINE</span></a>
</nav>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close">×</button>
  <img id="lightbox-img" src="" onclick="event.stopPropagation()">
</div>

<script>
// --- バッジ消去（iPhone PWA対応強化） ---
async function clearBadge() {
  if ('clearAppBadge' in navigator) {
    try { 
      await navigator.clearAppBadge(); 
      await navigator.setAppBadge(0); // 確実に0を書き込む
    } catch (e) {}
  }
}
window.addEventListener('load', clearBadge);
window.addEventListener('focus', clearBadge);

// --- ライトボックス機能 ---
function openLightbox(src) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightbox-img');
  if(src) {
    img.src = src;
    lb.classList.add('open');
  }
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

// --- Supabase 接続設定 ---
const SUPABASE_URL = 'https://ipzdgsodhcxhnpajfvrt.supabase.co';
const SB_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlwemRnc29kaGN4aG5wYWpmdnJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNTgzNTcsImV4cCI6MjA4ODYzNDM1N30.b6ce95bLev-_6t2LidinKiRdn7VMV79iy9yBrz0db6k';

async function sbGetSetting(key) {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/site_settings?key=eq.${key}&select=value`, {
      headers: { 'apikey': SB_ANON_KEY, 'Authorization': 'Bearer ' + SB_ANON_KEY }
    });
    const d = await r.json();
    return d[0]?.value || null;
  } catch(e) { return null; }
}

// --- 各コンテンツ読み込み ---
async function initAllContent() {
  await Promise.all([
    loadSlides(),
    loadNextEvent(),
    loadInstaPosts(),
    loadNews(),
    loadAbout(),
    loadEvents(),
    loadAccessInfo()
  ]);
  initReveal();
}

async function loadSlides() {
  const raw = await sbGetSetting('slides');
  const slides = raw ? JSON.parse(raw) : [];
  const ss = document.getElementById('slideshow');
  slides.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'slide' + (i === 0 ? ' active' : '');
    // 画像をクリックでライトボックス表示
    d.innerHTML = `<img src="${s.url}" onclick="openLightbox('${s.url}')"><div class="slide-caption">${s.caption}</div>`;
    ss.appendChild(d);
  });
}

async function loadInstaPosts() {
  const wrap = document.getElementById('instaPostsWrap');
  const raw = await sbGetSetting('insta_posts');
  const posts = raw ? JSON.parse(raw) : [];
  // グリッド形式で表示し、クリックで拡大
  wrap.innerHTML = posts.map(p => `
    <div class="insta-post-item" onclick="openLightbox('${p.imageUrl}')">
      <img src="${p.imageUrl}" loading="lazy">
    </div>
  `).join('');
}

async function loadNews() {
  const wrap = document.getElementById('newsWrap');
  const raw = await sbGetSetting('news_posts');
  const posts = raw ? JSON.parse(raw) : [];
  wrap.innerHTML = posts.map(p => `
    <div class="post-card reveal">
      <h4>${p.title}</h4>
      <p>${(p.body||'').replace(/\n/g,'<br>')}</p>
      ${p.imageUrl ? `<img src="${p.imageUrl}" onclick="openLightbox('${p.imageUrl}')">` : ''}
    </div>
  `).join('');
}

async function loadNextEvent() {
  const [content, open, bg] = await Promise.all([sbGetSetting('next_event_html'), sbGetSetting('apply_open'), sbGetSetting('photo_next_event_bg')]);
  if(content) document.getElementById('nextEventContent').innerHTML = content;
  if(bg) document.getElementById('nextEventCard').style.backgroundImage = `url(${bg})`;
}

async function loadAbout() {
  const raw = await sbGetSetting('about_features');
  const feats = raw ? JSON.parse(raw) : [];
  document.getElementById('featuresGrid').innerHTML = feats.map(f => `<div class="feature-card reveal"><span class="feat-icon">${f.icon}</span><h4>${f.title}</h4><p>${f.body}</p></div>`).join('');
}

async function loadEvents() {
  const raw = await sbGetSetting('events_list');
  const evs = raw ? JSON.parse(raw) : [];
  document.getElementById('eventsList').innerHTML = evs.map(e => `<div class="event-item reveal"><h4>${e.name}</h4><p>${e.month}/${e.day}</p></div>`).join('');
}

async function loadAccessInfo() {
  const raw = await sbGetSetting('access_info');
  if(!raw) return;
  const d = JSON.parse(raw);
  if(d.mapUrl) document.getElementById('accessMapWrap').innerHTML = `<iframe src="${d.mapUrl}" allowfullscreen loading="lazy"></iframe>`;
}

// 共通処理
function switchTab(name, btn) {
  document.getElementById('tab-instagram').style.display = name === 'instagram' ? 'block' : 'none';
  document.getElementById('tab-news').style.display = name === 'news' ? 'block' : 'none';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function slideNext() {
  const sl = document.querySelectorAll('.slide');
  let c = Array.from(sl).findIndex(s => s.classList.contains('active'));
  sl[c].classList.remove('active');
  sl[(c + 1) % sl.length].classList.add('active');
}

function initReveal() {
  const obs = new IntersectionObserver(es => { es.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); }); }, {threshold: 0.1});
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
}

document.addEventListener('DOMContentLoaded', initAllContent);
document.getElementById('menuBtn').addEventListener('click', () => {
  document.getElementById('navDrawer').classList.add('open');
  document.getElementById('navOverlay').classList.add('open');
});
function closeMenu() {
  document.getElementById('navDrawer').classList.remove('open');
  document.getElementById('navOverlay').classList.remove('open');
}
</script>
</body>
</html>
