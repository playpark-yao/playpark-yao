// ===== SLIDESHOW =====
let cur=0,timer=null;
async function loadSlides(){const raw=await sbGetSetting('slides');const slides=raw?JSON.parse(raw):[{id:1,url:'',caption:'自然の中で自由に遊ぼう！'}];initSlideshow(slides);}
function initSlideshow(slides){
const ss=document.getElementById('slideshow');const dots=document.getElementById('slideDots');
ss.querySelectorAll('.slide').forEach(s=>s.remove());dots.innerHTML='';
const bgs=['linear-gradient(160deg,#c8f0a0,#87d4a8 40%,#87ceeb)','linear-gradient(160deg,#ffe082,#ffb74d 50%,#ff8f00)','linear-gradient(160deg,#b2dfdb,#4db6ac 50%,#00796b)'];
slides.forEach((s,i)=>{
const div=document.createElement('div');div.className='slide'+(i===0?' active':'');
if(s.url){div.innerHTML=`<img src="${s.url}" onclick="openLightbox('${s.url}')" alt="${s.caption}" style="cursor:pointer;"><div class="slide-caption">${s.caption}</div>`;}
else{div.innerHTML=`<div class="slide-bg" style="background:${bgs[i%bgs.length]}"><span>🌿</span></div><div class="slide-caption">${s.caption}</div>`;}
ss.insertBefore(div,ss.querySelector('.slide-prev'));
const dot=document.createElement('button');dot.className='slide-dot'+(i===0?' active':'');dot.onclick=()=>goSlide(i);dots.appendChild(dot);
});
cur=0;clearInterval(timer);if(slides.length>1)timer=setInterval(()=>slideNext(),4500);
}
function goSlide(n){const sl=document.querySelectorAll('.slide'),dt=document.querySelectorAll('.slide-dot');if(!sl.length)return;sl[cur].classList.remove('active');dt[cur]?.classList.remove('active');cur=(n+sl.length)%sl.length;sl[cur].classList.add('active');dt[cur]?.classList.add('active');}
function slideNext(){goSlide(cur+1);}function slidePrev(){goSlide(cur-1);}

// ===== APPLY =====
async function loadApply(){
const[isOpenRaw,formUrl,closedMsg]=await Promise.all([sbGetSetting('apply_open'),sbGetSetting('google_form_url'),sbGetSetting('apply_closed_message')]);
const isOpen=isOpenRaw!=='false';
renderApplyStatus(isOpen,formUrl,closedMsg);renderApplyMain(isOpen,formUrl,closedMsg);
}
function renderApplyStatus(isOpen,formUrl,closedMsg){
const w=document.getElementById('applyStatusWrap');
if(isOpen){const url=formUrl||'#apply-section';const target=formUrl?'target="_blank"':'';w.innerHTML=`<a href="${url}" ${target} class="apply-open-btn">📝 この回に申し込む →</a>`;}
else{w.innerHTML=`<div class="apply-closed-box"><div style="font-size:24px;margin-bottom:4px;">🚫</div>${closedMsg||'現在申込を停止しています。'}</div>`;}
}
function renderApplyMain(isOpen,formUrl,closedMsg){
const a=document.getElementById('applyMainArea');
if(isOpen){if(formUrl){a.innerHTML=`<div style="background:white;border-radius:16px;padding:28px;text-align:center;box-shadow:var(--shadow);"><div style="font-size:48px;margin-bottom:12px;">📝</div><h3 style="font-size:18px;font-weight:900;color:var(--green);margin-bottom:8px;">参加申込フォーム</h3><p style="font-size:13px;color:var(--text-light);margin-bottom:20px;line-height:1.6;">Googleフォームから簡単にお申し込みいただけます。</p><a href="${formUrl}" target="_blank" style="display:block;background:var(--green);color:white;border-radius:50px;padding:16px;font-size:16px;font-family:'Zen Maru Gothic',sans-serif;font-weight:900;text-decoration:none;">📝 申込フォームを開く</a></div>`;}else{a.innerHTML=`<div style="background:white;border-radius:16px;padding:28px;text-align:center;"><p style="color:var(--text-light);font-size:13px;line-height:1.8;">申込フォームを準備中です。<br>しばらくお待ちください。</p></div>`;}}
else{a.innerHTML=`<div style="background:white;border-radius:16px;padding:32px 24px;text-align:center;box-shadow:var(--shadow);"><div style="font-size:52px;margin-bottom:12px;">🚫</div><h3 style="font-size:18px;font-weight:900;color:var(--red);margin-bottom:8px;">現在申込を停止しています</h3><p style="font-size:13px;color:var(--text-light);line-height:1.6;">${closedMsg||'次回開催情報をお待ちください。'}</p><a href="#line" style="display:inline-block;margin-top:16px;background:#06C755;color:white;border-radius:50px;padding:12px 24px;font-size:14px;font-family:'Zen Maru Gothic',sans-serif;font-weight:700;text-decoration:none;">💬 LINEで通知を受け取る</a></div>`;}
}

// ===== NEWS =====
async function loadNews(){
const wrap=document.getElementById('newsWrap')||document.getElementById('tab-news');if(!wrap)return;
try{
const raw=await sbGetSetting('news_posts');
const TAG_LABEL={event:'📅 イベント',news:'📢 お知らせ',report:'📷 活動報告'};
const TAG_CLS={event:'tag-event',news:'tag-news',report:'tag-report'};
const posts=raw?JSON.parse(raw):[];
if(!posts.length){wrap.innerHTML='<p style="text-align:center;color:var(--text-light);padding:20px;font-size:13px;">お知らせはありません</p>';return;}
const show=posts.slice(0,3);const more=posts.length>3;
wrap.innerHTML=show.map(p=>{
const photos=p.images||[];
return `<div class="post-card reveal"><div class="post-tag ${TAG_CLS[p.tag]||'tag-news'}">${TAG_LABEL[p.tag]||'📢 お知らせ'}</div><div class="post-date">${p.date||''}</div><h4>${p.title||''}</h4>${p.body?`<p>${nl2br(p.body)}</p>`:''}${photos.length?`<div style="display:flex;gap:8px;margin-top:10px;">${photos.map(img=>`<img src="${img}" onclick="openLightbox('${img}')" style="width:${photos.length===1?'33.33%':photos.length===2?'calc(33.33% - 4px)':'calc(33.33% - 6px)'};aspect-ratio:1;object-fit:cover;border-radius:8px;cursor:pointer;">`).join('')}</div>`:''}</div>`;
}).join('')+(more?`<div style="text-align:center;margin-top:8px;"><a href="news.html" style="display:inline-flex;align-items:center;gap:6px;background:var(--green);color:white;border-radius:50px;padding:10px 24px;font-size:13px;font-family:'Zen Maru Gothic',sans-serif;font-weight:700;text-decoration:none;">📢 お知らせをもっと見る →</a></div>`:'');
initReveal();
}catch(e){wrap.innerHTML='<p style="text-align:center;color:var(--text-light);padding:20px;font-size:13px;">読み込みに失敗しました</p>';}
}

function switchTab(name,btn){
if(name==='videos')loadVideos();if(name==='news')loadNews();
['instagram','news','videos'].forEach(t=>{const e=document.getElementById('tab-'+t);if(e)e.style.display='none';});
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
const t=document.getElementById('tab-'+name);if(t)t.style.display='block';btn.classList.add('active');
}
function initReveal(){
const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});},{threshold:.1});
document.querySelectorAll('.reveal:not(.visible)').forEach(el=>obs.observe(el));
}

function urlBase64ToUint8Array(b){const p='='.repeat((4-b.length%4)%4);const base64=(b+p).replace(/-/g,'+').replace(/_/g,'/');const raw=window.atob(base64);const out=new Uint8Array(raw.length);for(let i=0;i<raw.length;++i)out[i]=raw.charCodeAt(i);return out;}
