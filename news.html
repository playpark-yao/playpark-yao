<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お知らせ一覧 | プレーパーク八尾</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root{--green:#3a7d44;--green-light:#6abf69;--green-pale:#e8f5e9;--earth:#8d6e47;--sky:#87ceeb;--sky-dark:#4a9ebe;--sun:#f5c842;--red:#e05a44;--bg:#fffef7;--text:#2c2c2c;--text-light:#666;--shadow:0 4px 20px rgba(0,0,0,0.08);--radius:20px;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Zen Maru Gothic',sans-serif;background:var(--bg);color:var(--text);}
    header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,247,0.93);backdrop-filter:blur(12px);border-bottom:2px solid var(--green-pale);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .logo-icon{width:40px;height:40px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;}
    .logo-text .main{font-size:14px;font-weight:900;color:var(--green);}
    .logo-text .sub{font-size:9px;color:var(--earth);}
    .back-btn{background:var(--green-pale);color:var(--green);border:none;border-radius:50px;padding:8px 16px;font-size:12px;font-family:'Zen Maru Gothic',sans-serif;font-weight:700;cursor:pointer;text-decoration:none;}
    .hero{margin-top:70px;background:linear-gradient(135deg,var(--green),var(--sky-dark));padding:40px 20px;text-align:center;color:white;}
    .hero h1{font-size:26px;font-weight:900;margin-bottom:6px;}
    .hero p{font-size:13px;opacity:.85;}
    main{max-width:680px;margin:0 auto;padding:24px 16px 80px;}
    .filter-bar{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;}
    .filter-btn{flex-shrink:0;background:white;border:2px solid var(--green-pale);color:var(--text-light);border-radius:50px;padding:8px 16px;font-size:12px;font-family:'Zen Maru Gothic',sans-serif;font-weight:700;cursor:pointer;}
    .filter-btn.active{background:var(--green);border-color:var(--green);color:white;}
    .post-card{background:white;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:14px;border-left:5px solid var(--green);}
    .post-card.event{border-left-color:var(--sun);}
    .post-card.report{border-left-color:var(--sky-dark);}
    .post-tag{font-size:10px;font-weight:900;padding:3px 12px;border-radius:20px;display:inline-block;margin-bottom:8px;}
    .tag-event{background:var(--sun);color:var(--earth);}
    .tag-news{background:var(--green-pale);color:var(--green);}
    .tag-report{background:var(--sky);color:var(--sky-dark);}
    .post-date{font-size:11px;color:var(--text-light);margin-bottom:6px;}
    .post-card h3{font-size:16px;font-weight:900;margin-bottom:8px;line-height:1.4;}
    .post-card p{font-size:13px;color:var(--text-light);line-height:1.7;white-space:pre-wrap;}
    .empty{text-align:center;padding:60px 20px;color:var(--text-light);}
    .empty .ei{font-size:48px;margin-bottom:12px;}
    .loading{text-align:center;padding:60px;color:var(--text-light);font-size:14px;}
    .lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;display:none;align-items:center;justify-content:center;padding:20px;}
    .lightbox.open{display:flex;}
    .lightbox img{max-width:100%;max-height:90vh;object-fit:contain;border-radius:8px;}
    .lightbox-close{position:absolute;top:16px;right:16px;width:44px;height:44px;background:rgba(255,255,255,0.15);border:none;border-radius:50%;color:white;font-size:22px;cursor:pointer;}
    .back-top{position:fixed;bottom:90px;right:16px;width:44px;height:44px;background:var(--green);color:white;border:none;border-radius:50%;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;text-decoration:none;z-index:99;opacity:0;transition:opacity .3s;}
    .back-top.show{opacity:1;}
    .page-nav{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
    .page-nav a{display:inline-flex;align-items:center;gap:6px;background:white;color:var(--green);border:2px solid var(--green);border-radius:50px;padding:8px 16px;font-size:12px;font-family:'Zen Maru Gothic',sans-serif;font-weight:700;text-decoration:none;}
    .page-nav a:hover{background:var(--green);color:white;}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1.5px solid var(--green-pale);display:flex;z-index:100;}
    .bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;text-decoration:none;color:var(--text-light);font-size:10px;font-weight:700;}
    .bottom-nav a.active{color:var(--green);}
    .bottom-nav a span:first-child{font-size:22px;}
  </style>
</head>
<body>
<header>
  <a href="index.html" class="logo">
    <div class="logo-icon">🌳</div>
    <div class="logo-text"><div class="main">プレーパーク八尾</div><div class="sub">PLAY PARK YAO</div></div>
  </a>
  <a href="index.html" class="back-btn">← トップへ</a>
</header>

<div class="hero">
  <h1>📢 お知らせ一覧</h1>
  <p>最新のお知らせ・活動報告をまとめています</p>
</div>

<main>
  <div class="page-nav">
    <a href="index.html">🏠 トップページへ</a>
    <a href="events-list.html">📅 イベント一覧</a>
  </div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterNews('all',this)">すべて</button>
    <button class="filter-btn" onclick="filterNews('event',this)">📅 イベント</button>
    <button class="filter-btn" onclick="filterNews('news',this)">📢 お知らせ</button>
  </div>
  <div id="newsList"><div class="loading">⏳ 読み込み中...</div></div>
</main>

<a href="#" class="back-top" id="backTop">↑</a>

<nav class="bottom-nav">
  <a href="index.html"><span>🏠</span><span>ホーム</span></a>
  <a href="events-list.html"><span>📅</span><span>イベント</span></a>
  <a href="news.html" class="active"><span>📢</span><span>お知らせ</span></a>
  <a href="index.html#line"><span>💬</span><span>LINE</span></a>
</nav>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<script>
const SB_URL='https://ipzdgsodhcxhnpajfvrt.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlwemRnc29kaGN4aG5wYWpmdnJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNTgzNTcsImV4cCI6MjA4ODYzNDM1N30.b6ce95bLev-_6t2LidinKiRdn7VMV79iy9yBrz0db6k';
const HDR={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};
const TAG_LABEL={event:'📅 イベント',news:'📢 お知らせ'};
const TAG_CLS  ={event:'tag-event',  news:'tag-news'};
const CARD_CLS ={event:'event',      news:''};

let allPosts=[], currentFilter='all';

async function init(){
  const r = await fetch(`${SB_URL}/rest/v1/site_settings?key=eq.news_posts&select=value`,{headers:HDR});
  const rows = await r.json();
  const raw = rows?.[0]?.value||null;
  allPosts = raw ? JSON.parse(raw) : [];
  render();
}

function render(){
  const list = document.getElementById('newsList');
  const posts = (currentFilter==='all' ? allPosts : allPosts.filter(p=>p.tag===currentFilter)).filter(p=>p.tag!=='report');
  if(!posts.length){
    list.innerHTML=`<div class="empty"><div class="ei">📭</div><p>${currentFilter==='all'?'まだお知らせがありません':'該当するお知らせがありません'}</p></div>`;
    return;
  }
  list.innerHTML = posts.map(p=>{
    const photos = p.images||[];
    return `<div class="post-card ${CARD_CLS[p.tag]||''}">
      <div class="post-tag ${TAG_CLS[p.tag]||'tag-news'}">${TAG_LABEL[p.tag]||'📢 お知らせ'}</div>
      <div class="post-date">${p.date||''}</div>
      <h3>${p.title||''}</h3>
      ${p.body?`<p>${p.body}</p>`:''}
      ${photos.length?`<div style="display:flex;gap:8px;margin-top:12px;">
        ${photos.map(img=>`<img src="${img}" onclick="openLightbox('${img}')" style="width:33.33%;flex:0 0 33.33%;aspect-ratio:1;object-fit:cover;border-radius:10px;cursor:pointer;">`).join('')}
      </div>`:''}
    </div>`;
  }).join('');
}

function filterNews(tag, btn){
  currentFilter = tag;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function openLightbox(src){
  document.getElementById('lightboxImg').src=src;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow='';
}

init();
window.addEventListener('scroll',()=>{
  const btn=document.getElementById('backTop');
  if(btn) btn.classList.toggle('show', window.scrollY>300);
});
</script>
</body>
</html>
